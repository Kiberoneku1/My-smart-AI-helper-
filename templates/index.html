<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Киносоветчик с ИИ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
     <h1>AI Киносоветчик</h1>
     <p>Введите фразу о своём настроение. ИИ подберём фильм</p>
     <form method="post">
         <label for="message">Напиши как себя чувствуешь</label>
         <textarea name="message" id="message" cols="50" rows="4" required
         placeholder="например: Сегодня у меня был отличный день">
             {{ user_text }}
         </textarea>
         <button type="submit">Получить рекомендацию</button>
     </form>

     {% if recommendation %}
     <div class="result">
          <h3>рекомендация</h3>
          <p>{{ recommendation|safe }}</p>
     </div>
     {% endif %}
</body>
</html>
